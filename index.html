// Gemini直接呼び出し（GAS未設定時のフォールバック）
const callGeminiDirect = async (apiKey, systemPrompt, messages, jsonMode = false) => {
  const contents = messages.map(m => ({
    role: m.role === "assistant" ? "model" : "user",
    parts: [{ text: m.content }],
  }));
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents,
        generationConfig: {
          maxOutputTokens: jsonMode ? 2000 : 800,
          temperature: jsonMode ? 0.1 : 0.7,
          thinkingConfig: { thinkingBudget: 0 },
          ...(jsonMode ? { responseMimeType: "application/json" } : {}),
        },
      }),
    }
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
};

// JSON抽出
const extractJSON = (text) => {
  const cleaned = text.replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/```\s*$/i,"").trim();
  try { return JSON.parse(cleaned); } catch {}
  const m = cleaned.match(/(\{[\s\S]*\})/);
  if (m) { try { return JSON.parse(m[1]); } catch {} }
  return null;
};

## 絶対に守るルール
- 完成した「答え」や結論をこちらから出さない。ただし相手が詰まっている・疲れているときは、考え方のヒント・視点・方向性を短く示してよい（後述「詰まったとき」参照）。
- 問いかけは1ターンに1問のみ。
- 返答は簡潔に。1〜3文を基本とする。
- セッションを長引かせない。相手の発言10回前後を目安に収束・整理へ誘導する。掘り切れなかった論点は「次回のテーマにしましょう」と残してよい。
- 相手の名前：${nameRef}。自然なタイミングで使う（毎回は使わない）。
- 丁寧だが堅すぎず、伴走者として自然なトーンで話す。
- 内部的なステップ名は絶対に発言しない。自然な会話として進める。
- 整理・まとめは自分では出力しない。必ず「一度考えを整理してみますか？」と確認してから終わる。

## 会話の進め方（内部指針・発言禁止）
【現状把握】まず事実・数字・期間を引き出す。teamテーマ以外では市場・競合の把握状況も確認。2〜3往復を目安にする。

【課題と原因の深掘り】「なぜそうなっているか」を掘り下げる。表面的な答えで止まらせない。

【解決策と根拠を引き出す】「では何ができると思いますか？」「なぜそれが効くと思いますか？」と相手に語らせる。${!isTeam ? "競合との比較・市場ポジショニングの観点も引き出す。USPはスペック訴求ではなくエリア・タイミング固有の根拠まで深める。" : ""}

【収束・整理への誘導】課題・原因・解決策が出揃ったと判断したら「ここまでの話を聞いていると、〇〇という核心が見えてきました。一度ここで考えを整理してみますか？」と確認する。整理の本文は絶対に自分では書かない。

## 詰まったとき・疲れているときのサポート（最重要）
相手が次のサインを見せたら、問い詰めずに思考をサポートする：
- 返答が短い・「わかりません」「難しい」「うーん」など詰まっている
- 同じ内容を繰り返している
- 文章が投げやり・後ろ向きで、回答するのがつらそうに見える

サポートは段階的に行う：
① 問いを言い換える・具体例に落とす（例：「直近の1組で言うと、どうでしたか？」）
② 視点の選択肢を2〜4個提示する：
「少し視点を変えてみましょう。次のどれが近いですか？
A. 〇〇という観点
B. △△という観点
C. □□という観点」
③ それでも詰まる場合は、考え方のヒントや方向性を1〜2文で示す。
例：「来場数は『物件を知る人の数 × 興味を持つ率 × 来場のハードル』に分解できます。どこが一番弱そうですか？」
フレームワークや切り口は示してよいが、結論そのものは相手に語らせる。

- 詰まった相手に問いだけを重ねない。2往復続けて答えが出なければ必ず③に進む。
- 相手が「ヒントがほしい」「方向性を教えて」と言ったら、遠慮なく②③を示す。
- 選択肢やヒントの後は「なぜそう思いましたか？」と一段だけ深掘りする（しつこく掘らない）。

// ── GAS API呼び出し（リトライ付き）──
const sleep = ms => new Promise(r => setTimeout(r, ms));

const gasCall = async (action, params, retries = 2) => {
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const res = await fetch(ACTIVE_GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, ...params }),
        redirect: "follow",
      });
      // 503/429はリトライ対象
      if (res.status === 503 || res.status === 429) {
        if (attempt < retries) {
          await sleep(2000 * (attempt + 1));
          continue;
        }
        throw new Error(`サーバーが混雑しています（${res.status}）。少し時間をおいて再送信してください。`);
      }
      // テキストで受け取ってからJSONパース（CORSエラー時のデバッグのため）
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch(pe) { throw new Error(`レスポンス解析エラー。GASのデプロイURLを確認してください。受信内容: ${text.slice(0,100)}`); }
      if (!data.ok) throw new Error(data.error || "GASエラー");
      return data;
    } catch(e) {
      if (attempt < retries && !e.message.includes("デプロイURL")) {
        await sleep(2000 * (attempt + 1));
        continue;
      }
      throw e;
    }
  }
};

// ── UIコンポーネント ──
const RichText = ({ text }) => {
  const lines = text.split("\n");
  const elements = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // 空行
    if (!line.trim()) { elements.push(<div key={i} style={{ height:"6px" }} />); i++; continue; }

    // 選択肢ブロック（A. B. C. D. で始まる行）
    if (/^[A-D][.．]/.test(line.trim())) {
      elements.push(
        <div key={i} style={{ display:"flex", gap:"10px", alignItems:"flex-start",
          margin:"4px 0", paddingLeft:"8px" }}>
          <span style={{ color:T.gold, fontWeight:"700", fontSize:"13px",
            flexShrink:0, minWidth:"22px" }}>{line.trim()[0]}.</span>
          <span style={{ fontSize:"14px", color:T.text, lineHeight:"1.8" }}>
            {renderInline(line.trim().slice(2).trim())}
          </span>
        </div>
      );
      i++; continue;
    }

    // 箇条書き（- ・ * で始まる行）
    if (/^[-・*]\s/.test(line.trim())) {
      elements.push(
        <div key={i} style={{ display:"flex", gap:"8px", alignItems:"flex-start",
          margin:"3px 0", paddingLeft:"4px" }}>
          <span style={{ color:T.gold, flexShrink:0, marginTop:"3px", fontSize:"12px" }}>◆</span>
          <span style={{ fontSize:"14px", color:T.text, lineHeight:"1.8" }}>
            {renderInline(line.trim().slice(1).trim())}
          </span>
        </div>
      );
      i++; continue;
    }

    // 通常行
    elements.push(
      <p key={i} style={{ margin:"3px 0", fontSize:"14px", lineHeight:"1.85", color:T.text }}>
        {renderInline(line)}
      </p>
    );
    i++;
  }
  return <div>{elements}</div>;
};

// インライン装飾（**太字** と ==ハイライト== に対応）
const renderInline = (text) => {
  const parts = text.split(/(\*\*.*?\*\*|==.*?==)/);
  return parts.map((p, j) => {
    if (p.startsWith("**") && p.endsWith("**"))
      return <strong key={j} style={{ color:T.goldDim, fontWeight:"700" }}>{p.slice(2,-2)}</strong>;
    if (p.startsWith("==") && p.endsWith("=="))
      return <span key={j} style={{ color:"#1a5a8a", fontWeight:"600" }}>{p.slice(2,-2)}</span>;
    return p;
  });
};

// ── メインApp ──
function App() {
  const [phase, setPhase] = useState("setup"); // setup|name|prop|theme|chat|summary
  const [gasUrl,      setGasUrl]      = useState(GAS_URL);
  const [geminiKey,   setGeminiKey]   = useState(""); // GAS未設定時のフォールバック用
  const [userName,    setUserName]    = useState("");
  // ?property=XXXXXX で物件コードを事前指定できる（統合規約のエントリパターン）
  const [propCode,    setPropCode]    = useState(() => {
    try { return new URLSearchParams(window.location.search).get("property") || ""; } catch { return ""; }
  });
  const [propName,    setPropName]    = useState("");
  const [folderId,    setFolderId]    = useState("");
  const [docText,     setDocText]     = useState("");
  const [cat, setCat] = useState(null);
  const [sub, setSub] = useState(null);
  const [msgs,  setMsgs]  = useState([]);
  const [input, setInput] = useState("");
  const [loading,      setLoading]      = useState(false);
  const [awaitConfirm, setAwaitConfirm] = useState(false);
  const [summary,  setSummary]  = useState(null);
  const [error,    setError]    = useState("");
  const [saveInfo, setSaveInfo] = useState(""); // Drive保存先の表示用
  const [sessionId, setSessionId] = useState("");
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [msgs, loading]);

  const system = buildSystem(cat, sub, docText, userName);

  // GAS経由 or Gemini直接のスマートな呼び出しラッパー
  const smartChat = async (messages) => {
    if (GAS_READY) {
      const res = await gasCall("chat", { messages, systemPrompt:system, folderId, sessionId, userName });
      return res.reply;
    } else {
      // GAS未設定：Gemini直接呼び出し
      if (!geminiKey) throw new Error("APIキーが設定されていません。SETUPでGemini APIキーを入力してください。");
      return await callGeminiDirect(geminiKey, system, messages, false);
    }
  };

  const smartSummary = async (messages) => {
    if (GAS_READY) {
      const trimmed = messages.length > 40 ? messages.slice(-40) : messages;
      return await gasCall("saveSummary", {
        messages: trimmed,
        folderId: folderId || "",
        sessionId: sessionId || "no_session",
        categoryId: cat?.id || "",
        categoryLabel: cat?.label || "",
        subLabel: sub?.label || "",
        userName: userName || "",
      });
    } else {
      // GAS未設定：Gemini直接でサマリー生成（Drive保存なし）
      if (!geminiKey) throw new Error("APIキーが設定されていません。");
      const isTeam = cat?.id === "team";
      const summarySystem = `会話を構造化JSONに変換してください。前後に説明文・コードブロック記号は不要。
{"type":"summary","data":{"situation":"現状","issues":["課題"],"causes":["原因"],"solutions":["解決策"],"rationale":"根拠","positioning":"${isTeam?"":"USP"}","ai_comment":"AIの所見1〜3文"}}`;
      const conv = messages.map(m => (m.role==="assistant"?"AI: ":"ユーザー: ") + m.content).join("\n");
      const trimmed = messages.length > 40 ? messages.slice(-40) : messages;
      const convTrimmed = trimmed.map(m => (m.role==="assistant"?"AI: ":"ユーザー: ") + m.content).join("\n");
      const reply = await callGeminiDirect(geminiKey, summarySystem,
        [{ role:"user", content:`以下の会話を整理してJSONで返してください。\n\n${convTrimmed}` }], true);
      const parsed = extractJSON(reply);
      if (!parsed || parsed.type !== "summary") throw new Error("JSON生成に失敗しました。");
      setSaveInfo("（GAS未設定のためDrive保存なし）");
      return { ok:true, summary: parsed.data };
    }
  };
  // セッションID生成
  const genSessionId = () => {
    const d = new Date();
    const pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}_${sub?.label||""}`;
  };

  // 物件フォルダ読み取り
  const loadPropertyDoc = async () => {
    if (!propCode.trim()) { setPhase("theme"); return; }
    setLoading(true); setError("");
    try {
      const res = await gasCall("getPropertyDoc", { propertyCode: propCode.trim() });
      setPropName(res.propertyName);
      setFolderId(res.folderId);
      setDocText(res.docText);
    } catch(e) {
      setError(`物件フォルダの読み取りに失敗しました：${e.message}`);
      setDocText("");
    }
    setLoading(false);
    setPhase("theme");
  };

  // セッション開始
  const startSession = async () => {
    const sid = genSessionId();
    setSessionId(sid);
    setPhase("chat"); setLoading(true); setError("");
    try {
      const init = [{ role:"user", content:"セッションを開始してください。" }];
      const reply = await smartChat(init);
      setMsgs([{ role:"assistant", content:reply }]);
    } catch(e) {
      setError("セッション開始に失敗しました：" + e.message);
      setPhase("theme");
    }
    setLoading(false);
  };

  // メッセージ送信
  const send = async (text) => {
    if (!text.trim() || loading) return;
    const next = [...msgs, { role:"user", content:text }];
    setMsgs(next); setInput(""); setLoading(true); setAwaitConfirm(false);
    try {
      const reply = await smartChat(next);
      const isConfirm = ["整理してみますか","まとめてみますか","振り返ってみますか"].some(p => reply.includes(p));
      setMsgs([...next, { role:"assistant", content:reply }]);
      if (isConfirm) setAwaitConfirm(true);
    } catch(e) {
      setMsgs([...next, { role:"assistant", content:`⚠️ 通信エラーが発生しました。\n${e.message}\n\n少し時間をおいてから再度送信してください。` }]);
    }
    setLoading(false);
  };

  // 整理出力
  const doSummary = async () => {
    setAwaitConfirm(false); setLoading(true);
    try {
      const res = await smartSummary(msgs);
      setSummary(res.summary);
      setPhase("summary");
    } catch(e) {
      setMsgs(prev => [...prev, {
        role:"assistant",
        content:`⚠️ 整理の生成に失敗しました。\n${e.message}\n\n少し時間をおいてから「整理してください」とお伝えください。`
      }]);
    }
    setLoading(false);
  };

  const reset = () => {
    setPhase("name"); setCat(null); setSub(null);
    setDocText(""); setPropCode(""); setPropName(""); setFolderId("");
    setMsgs([]); setInput(""); setSummary(null);
    setAwaitConfirm(false); setError(""); setSessionId(""); setSaveInfo("");
  };

  // ── SETUP（GAS URL or Gemini APIキー）──
  if (phase === "setup") return (
    <Page>
      <div style={{ maxWidth:"480px", width:"100%" }}>
        <Logo />
        <p style={{ color:T.goldDim, fontSize:"11px", letterSpacing:"0.2em", marginBottom:"8px" }}>SETUP</p>
        <h1 style={{ color:T.text, fontSize:"22px", fontWeight:"300", lineHeight:"1.5", margin:"0 0 10px" }}>
          接続設定
        </h1>
        <GoldDivider />

        {/* GAS URL */}
        <p style={{ color:T.textSub, fontSize:"13px", fontWeight:"600", margin:"0 0 6px" }}>
          GAS URL <span style={{ color:T.textMuted, fontWeight:"400" }}>（Drive保存・物件連携あり）</span>
        </p>
        <input type="text" value={gasUrl} onChange={e => setGasUrl(e.target.value)}
          placeholder="https://script.google.com/macros/s/.../exec"
          style={{ width:"100%", padding:"12px 14px", background:T.surface,
            border:`1px solid ${T.border}`, borderRadius:"8px", color:T.text,
            fontSize:"12px", outline:"none", marginBottom:"20px", fontFamily:"monospace" }} />

        {/* Gemini APIキー（フォールバック） */}
        <p style={{ color:T.textSub, fontSize:"13px", fontWeight:"600", margin:"0 0 6px" }}>
          Gemini APIキー <span style={{ color:T.textMuted, fontWeight:"400" }}>（GAS未設定時のフォールバック）</span>
        </p>
        <input type="password" value={geminiKey} onChange={e => setGeminiKey(e.target.value)}
          placeholder="AIzaSy... （GAS設定済みなら不要）"
          style={{ width:"100%", padding:"12px 14px", background:T.surface,
            border:`1px solid ${T.border}`, borderRadius:"8px", color:T.text,
            fontSize:"13px", outline:"none", marginBottom:"8px", fontFamily:"monospace" }} />
        <p style={{ color:T.textMuted, fontSize:"11px", lineHeight:"1.7", margin:"0 0 20px" }}>
          {GAS_READY
            ? "✓ GAS URL設定済み。Drive保存・物件連携が有効です。"
            : "⚠️ GAS未設定。Gemini APIキーを入力するとDrive保存なしで動作確認できます。"}
        </p>

        <GoldBtn
          disabled={!GAS_READY && !geminiKey.trim()}
          onClick={() => {
            if (gasUrl.trim()) ACTIVE_GAS_URL = gasUrl.trim();
            setPhase("name");
          }}>
          次へ　→
        </GoldBtn>
      </div>
    </Page>
  );

  // ── 名前入力 ──
  if (phase === "name") return (
    <Page>
      <div style={{ maxWidth:"420px", width:"100%" }}>
        <Logo />
        <p style={{ color:T.goldDim, fontSize:"11px", letterSpacing:"0.2em", marginBottom:"8px" }}>WELCOME</p>
        <h1 style={{ color:T.text, fontSize:"24px", fontWeight:"300", lineHeight:"1.5", margin:"0 0 10px" }}>
          あなたのお名前を<br />教えてください
        </h1>
        <p style={{ color:T.textSub, fontSize:"13px", lineHeight:"1.8", margin:"0 0 4px" }}>
          セッション中にお名前でお呼びします。
        </p>
        <GoldDivider />
        <input
          type="text" value={userName}
          onChange={e => setUserName(e.target.value)}
          onKeyDown={e => { if (e.key==="Enter" && userName.trim()) setPhase("prop"); }}
          placeholder="例：田中"
          style={{ width:"100%", padding:"14px 16px", background:T.surface,
            border:`1px solid ${T.border}`, borderRadius:"8px", color:T.text,
            fontSize:"16px", outline:"none", marginBottom:"16px" }}
          autoFocus
        />
        <GoldBtn disabled={!userName.trim()} onClick={() => setPhase("prop")}>次へ　→</GoldBtn>
        <button onClick={() => { setUserName(""); setPhase("prop"); }}
          style={{ width:"100%", marginTop:"10px", padding:"12px", background:"transparent",
            border:`1px solid ${T.border}`, borderRadius:"8px",
            color:T.textMuted, fontSize:"13px", cursor:"pointer" }}>
          名前を入力せずに進む
        </button>
      </div>
    </Page>
  );

  // ── 物件コード入力 ──
  if (phase === "prop") return (
    <Page>
      <div style={{ maxWidth:"420px", width:"100%" }}>
        <Logo />
        <p style={{ color:T.goldDim, fontSize:"11px", letterSpacing:"0.2em", marginBottom:"8px" }}>PROPERTY</p>
        <h1 style={{ color:T.text, fontSize:"22px", fontWeight:"300", lineHeight:"1.5", margin:"0 0 10px" }}>
          物件コードを入力
        </h1>
        <p style={{ color:T.textSub, fontSize:"13px", lineHeight:"1.8", margin:"0 0 4px" }}>
          6桁の物件コードを入力してください。<br />
          DriveのフォルダからUSP資料・競合情報を自動で読み込みます。
          <br /><span style={{ color:T.textMuted }}>※ スキップするとテーマ選択のみで進みます</span>
        </p>
        {!GAS_READY && (
          <div style={{ background:"#fff9f0", border:"1px solid #e8c870", borderRadius:"8px",
            padding:"10px 14px", marginBottom:"12px", fontSize:"12px", color:"#8a6010" }}>
            ⚠️ GAS未設定のため物件フォルダ連携は無効です。スキップして進んでください。
          </div>
        )}
        <ErrorBox msg={error} />
        <GoldDivider />
        <input
          type="text" value={propCode}
          onChange={e => setPropCode(e.target.value)}
          onKeyDown={e => { if (e.key==="Enter") loadPropertyDoc(); }}
          placeholder="例：012345"
          maxLength={6}
          style={{ width:"100%", padding:"14px 16px", background:T.surface,
            border:`1px solid ${T.border}`, borderRadius:"8px", color:T.text,
            fontSize:"20px", outline:"none", marginBottom:"16px",
            letterSpacing:"0.3em", textAlign:"center", fontWeight:"600" }}
          autoFocus
        />
        <GoldBtn onClick={loadPropertyDoc}>
          {loading ? "読み込み中..." : "物件情報を読み込む　→"}
        </GoldBtn>
        <button onClick={() => { setPropCode(""); setPhase("theme"); }}
          style={{ width:"100%", marginTop:"10px", padding:"12px", background:"transparent",
            border:`1px solid ${T.border}`, borderRadius:"8px",
            color:T.textMuted, fontSize:"13px", cursor:"pointer" }}>
          スキップしてテーマ選択へ
        </button>
      </div>
    </Page>
  );

  // ── テーマ選択 ──
  if (phase === "theme") return (
    <Page scrollable={true}>
      <div style={{ maxWidth:"560px", width:"100%", paddingTop:"8px" }}>
        <Logo />
        {propName && (
          <div style={{ background:T.goldGlow, border:`1px solid ${T.border}`, borderRadius:"8px",
            padding:"10px 14px", marginBottom:"16px", display:"flex", alignItems:"center", gap:"8px" }}>
            <span style={{ color:T.gold, fontSize:"12px" }}>◆</span>
            <span style={{ color:T.textSub, fontSize:"13px" }}>{propName}</span>
          </div>
        )}
        <p style={{ color:T.goldDim, fontSize:"11px", letterSpacing:"0.2em", marginBottom:"8px" }}>THINK TOGETHER</p>
        <h1 style={{ color:T.text, fontSize:"24px", fontWeight:"300", lineHeight:"1.5", margin:"0 0 4px" }}>
          {userName.trim() ? `${userName.trim()}さん、` : ""}今日は何について<br />考えますか？
        </h1>
        <GoldDivider />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"8px" }}>
          {CATEGORIES.map(c => (
            <button key={c.id} onClick={() => { setCat(c); setSub(null); }} style={{
              background: cat?.id===c.id ? T.goldGlow : T.surface,
              border:`1px solid ${cat?.id===c.id ? T.goldDim : T.border}`,
              borderRadius:"10px", padding:"18px 14px", cursor:"pointer",
              display:"flex", flexDirection:"column", alignItems:"center", gap:"10px",
            }}>
              <div style={{ width:"38px", height:"38px", borderRadius:"50%",
                background: cat?.id===c.id ? T.gold : T.surfaceHi,
                display:"flex", alignItems:"center", justifyContent:"center",
                color: cat?.id===c.id ? "#fff" : T.textSub,
                fontSize:"12px", fontWeight:"700", letterSpacing:"0.05em" }}>{c.icon}</div>
              <span style={{ fontSize:"13px", fontWeight:"600",
                color: cat?.id===c.id ? T.goldDim : T.text }}>{c.label}</span>
            </button>
          ))}
        </div>
        {cat && (
          <div style={{ animation:"fadeIn 0.2s ease" }}>
            <GoldDivider />
            <p style={{ color:T.textSub, fontSize:"13px", marginBottom:"14px" }}>具体的なテーマを選んでください</p>
            <div style={{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"24px" }}>
              {cat.sub.map(s => (
                <button key={s.id} onClick={() => setSub(s.id===sub?.id ? null : s)} style={{
                  background: sub?.id===s.id ? T.goldGlow : T.surface,
                  border:`1px solid ${sub?.id===s.id ? T.goldDim : T.borderSub}`,
                  borderRadius:"8px", padding:"14px 16px", cursor:"pointer",
                  textAlign:"left", color: sub?.id===s.id ? T.text : T.textSub,
                  fontSize:"14px", display:"flex", alignItems:"center", gap:"10px",
                }}>
                  <span style={{ color: sub?.id===s.id ? T.gold : T.textMuted, fontSize:"10px" }}>
                    {sub?.id===s.id ? "◆" : "◇"}
                  </span>
                  {s.label}
                </button>
              ))}
            </div>
          </div>
        )}
        {sub && <GoldBtn onClick={startSession}>セッションを開始する　→</GoldBtn>}
      </div>
    </Page>
  );

  // ── チャット ──
  if (phase === "chat") return (
    <div style={{ height:"100dvh", display:"flex", flexDirection:"column", background:T.bg }}>
      <div style={{ background:T.surface, borderBottom:`1px solid ${T.border}`,
        padding:"12px 16px", display:"flex", alignItems:"center", gap:"12px",
        flexShrink:0, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
        <button onClick={reset} style={{ background:"transparent", border:`1px solid ${T.border}`,
          borderRadius:"6px", padding:"6px 12px", color:T.textSub, fontSize:"12px", cursor:"pointer" }}>
          終了
        </button>
        <div style={{ flex:1, textAlign:"center" }}>
          <div style={{ color:T.goldDim, fontSize:"10px", letterSpacing:"0.15em", marginBottom:"2px" }}>
            {propName || cat?.label}
          </div>
          <div style={{ color:T.text, fontSize:"13px", fontWeight:"600" }}>{sub?.label}</div>
          {userName.trim() && <div style={{ color:T.textMuted, fontSize:"11px", marginTop:"1px" }}>{userName}さん</div>}
        </div>
        <div style={{ width:"52px", textAlign:"right" }}>
          {folderId && <span style={{ color:T.gold, fontSize:"10px" }}>●保存中</span>}
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"20px 16px",
        display:"flex", flexDirection:"column", gap:"18px",
        WebkitOverflowScrolling:"touch", background:"#f5f2ec" }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display:"flex",
            justifyContent: m.role==="user" ? "flex-end" : "flex-start",
            gap:"10px", animation:"fadeIn 0.2s ease" }}>
            {m.role==="assistant" && (
              <div style={{ width:"32px", height:"32px", borderRadius:"50%",
                background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,
                display:"flex", alignItems:"center", justifyContent:"center",
                flexShrink:0, marginTop:"2px" }}>
                <span style={{ color:"#fff", fontSize:"10px", fontWeight:"700" }}>AI</span>
              </div>
            )}
            <div style={ m.role==="user" ? {
              maxWidth:"82%", background:T.surface, border:`1px solid ${T.border}`,
              borderRadius:"14px 4px 14px 14px", padding:"12px 16px",
              boxShadow:"0 1px 4px rgba(0,0,0,0.06)",
            } : {
              maxWidth:"82%", background:T.surface, borderLeft:`2px solid ${T.gold}`,
              borderRadius:"2px 12px 12px 2px", padding:"12px 16px",
              boxShadow:"0 1px 4px rgba(0,0,0,0.06)",
            }}>
              <RichText text={m.content} />
            </div>
          </div>
        ))}

        {awaitConfirm && !loading && (
          <div style={{ paddingLeft:"42px", display:"flex", flexDirection:"column",
            gap:"8px", animation:"fadeIn 0.2s ease" }}>
            <div style={{ color:T.textMuted, fontSize:"11px", letterSpacing:"0.1em", marginBottom:"2px" }}>
              — ご選択ください —
            </div>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
              <button onClick={doSummary} style={{ padding:"10px 16px",
                background:T.goldGlow, border:`1px solid ${T.gold}`,
                borderRadius:"8px", color:T.goldDim, fontSize:"13px",
                fontWeight:"600", cursor:"pointer" }}>
                ✦ はい、整理してください
              </button>
              <button onClick={() => { setAwaitConfirm(false); send("まだ話したいことがあります。続けてください。"); }}
                style={{ padding:"10px 16px", background:"transparent",
                  border:`1px solid ${T.border}`, borderRadius:"8px",
                  color:T.textSub, fontSize:"13px", cursor:"pointer" }}>
                もう少し続ける
              </button>
            </div>
          </div>
        )}

        {loading && (
          <div style={{ display:"flex", gap:"10px", alignItems:"flex-start" }}>
            <div style={{ width:"32px", height:"32px", borderRadius:"50%",
              background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,
              display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <span style={{ color:"#fff", fontSize:"10px", fontWeight:"700" }}>AI</span>
            </div>
            <div style={{ background:T.surface, borderLeft:`2px solid ${T.gold}`,
              borderRadius:"2px 12px 12px 2px", padding:"14px 18px",
              boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
              <div style={{ display:"flex", gap:"5px", alignItems:"center" }}>
                {[0,0.2,0.4].map((d,i) => (
                  <div key={i} style={{ width:"7px", height:"7px", borderRadius:"50%",
                    background:T.gold, animation:`glow 1.2s ease-in-out ${d}s infinite` }} />
                ))}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      <div style={{ borderTop:`1px solid ${T.border}`, padding:"12px 16px",
        background:T.surface, flexShrink:0, boxShadow:"0 -1px 4px rgba(0,0,0,0.04)" }}>
        {msgs.length > 0 && !loading && !awaitConfirm && (
          <div style={{ marginBottom:"8px" }}>
            <button
              onClick={() => send("少し考えるヒントや方向性がほしいです。")}
              style={{ padding:"7px 14px", background:T.goldGlowS,
                border:`1px dashed ${T.gold}`, borderRadius:"16px",
                color:T.goldDim, fontSize:"12px", cursor:"pointer" }}>
              💡 ヒントがほしい
            </button>
          </div>
        )}
        <div style={{ display:"flex", gap:"8px", alignItems:"flex-end" }}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);} }}
            placeholder="考えを入力してください"
            rows={2} disabled={loading}
            style={{ flex:1, padding:"12px 14px", background:T.surfaceHi,
              border:`1px solid ${T.border}`, borderRadius:"10px", color:T.text,
              fontSize:"14px", resize:"none", outline:"none", lineHeight:"1.6" }}
          />
          <button onClick={() => send(input)} disabled={!input.trim()||loading}
            style={{ padding:"12px 18px",
              background: input.trim()&&!loading ? `linear-gradient(135deg,${T.goldDim},${T.gold})` : T.surfaceHi,
              border:"none", borderRadius:"10px",
              color: input.trim()&&!loading ? "#fff" : T.textMuted,
              fontSize:"14px", fontWeight:"700",
              cursor: input.trim()&&!loading ? "pointer" : "not-allowed", flexShrink:0 }}>
            送信
          </button>
        </div>
      </div>
    </div>
  );

  // ── サマリー ──
  if (phase === "summary" && summary) {
    const isTeam = cat?.id === "team";

    // ブロック定義：ラベル・色・アイコン・背景
    const blocks = [
      { key:"situation", label:"📋 現状",   color:"#7a5c20", bg:"#fdf9f0", border:"#e8d5a0" },
      { key:"issues",    label:"🔍 課題",   color:"#8a2020", bg:"#fdf2f2", border:"#e8b0b0" },
      { key:"causes",    label:"🧩 原因",   color:"#1a3a8a", bg:"#f2f4fd", border:"#a0b0e8" },
      { key:"solutions", label:"💡 解決策", color:"#0a5a30", bg:"#f0fdf4", border:"#90d0a8" },
      { key:"rationale", label:"✅ 根拠",   color:"#2a4a10", bg:"#f4fdf0", border:"#a8d090" },
    ];

    const SummaryBlock = ({ label, color, bg, border, items, isSingle }) => (
      <div style={{ marginBottom:"16px", background:bg, borderRadius:"12px",
        border:`1px solid ${border}`, overflow:"hidden", animation:"fadeIn 0.3s ease" }}>
        {/* ラベルヘッダー */}
        <div style={{ background: border, padding:"8px 16px", display:"flex", alignItems:"center" }}>
          <span style={{ color, fontSize:"12px", fontWeight:"700", letterSpacing:"0.1em" }}>{label}</span>
        </div>
        {/* コンテンツ */}
        <div style={{ padding:"12px 16px", display:"flex", flexDirection:"column", gap:"8px" }}>
          {items.map((item, i) => (
            <div key={i} style={{ display:"flex", gap:"10px", alignItems:"flex-start" }}>
              {!isSingle && (
                <div style={{ width:"20px", height:"20px", borderRadius:"50%", background:color,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  flexShrink:0, marginTop:"2px" }}>
                  <span style={{ color:"#fff", fontSize:"10px", fontWeight:"700" }}>{i+1}</span>
                </div>
              )}
              <p style={{ color:T.text, fontSize:"14px", lineHeight:"1.85", margin:0, flex:1,
                fontWeight: isSingle ? "400" : "400" }}>
                {item}
              </p>
            </div>
          ))}
        </div>
      </div>
    );

    return (
      <Page scrollable={true}>
        <div style={{ maxWidth:"640px", width:"100%", paddingTop:"8px" }}>
          <Logo />

          {/* ヘッダー */}
          <div style={{ background:T.surface, borderRadius:"12px", padding:"16px 20px",
            border:`1px solid ${T.border}`, marginBottom:"20px" }}>
            <p style={{ color:T.goldDim, fontSize:"10px", letterSpacing:"0.2em", marginBottom:"4px" }}>
              SESSION SUMMARY
            </p>
            <h1 style={{ color:T.text, fontSize:"18px", fontWeight:"700", margin:"0 0 4px" }}>
              {sub?.label}
            </h1>
            <p style={{ color:T.textMuted, fontSize:"12px", margin:0 }}>
              {propName || cat?.label}
              {userName.trim() ? `　／　${userName}さん` : ""}
              　／　{new Date().toLocaleDateString("ja-JP")}
            </p>
            <div style={{ marginTop:"10px", padding:"8px 12px", borderRadius:"8px",
              background: folderId ? "#f0fdf4" : saveInfo ? "#fff9f0" : "#f8f8f8",
              border:`1px solid ${folderId ? "#90d0a8" : saveInfo ? "#e8c870" : "#e0e0e0"}`,
              fontSize:"12px", color: folderId ? "#0a5a30" : saveInfo ? "#8a6010" : "#7a7a7a" }}>
              {folderId
                ? `✓ 物件フォルダ（08_AIBOU）に保存されました`
                : saveInfo
                  ? saveInfo
                  : `📁 マイドライブ > AIBOU_logs に保存されました`
              }
            </div>
          </div>

          {/* 各ブロック */}
          {blocks.map(({ key, label, color, bg, border }) => {
            const val = summary[key];
            if (!val || (Array.isArray(val) && val.length === 0)) return null;
            const items = Array.isArray(val) ? val : [val];
            return (
              <SummaryBlock key={key} label={label} color={color} bg={bg} border={border}
                items={items} isSingle={items.length === 1} />
            );
          })}

          {/* USP */}
          {!isTeam && summary.positioning && (
            <div style={{ background:"linear-gradient(135deg,#fffbf0,#fdf6e3)",
              border:`2px solid ${T.gold}`, borderRadius:"12px",
              overflow:"hidden", marginBottom:"16px", animation:"fadeIn 0.3s ease" }}>
              <div style={{ background:T.gold, padding:"8px 16px", display:"flex", alignItems:"center", gap:"8px" }}>
                <span style={{ color:"#fff", fontSize:"14px" }}>✦</span>
                <span style={{ color:"#fff", fontSize:"12px", fontWeight:"700", letterSpacing:"0.1em" }}>
                  競合優位ポジショニング（USP）
                </span>
              </div>
              <div style={{ padding:"16px" }}>
                <p style={{ color:T.text, fontSize:"15px", lineHeight:"1.9", margin:0,
                  fontWeight:"600", borderLeft:`3px solid ${T.gold}`, paddingLeft:"12px" }}>
                  {summary.positioning}
                </p>
              </div>
            </div>
          )}

          {/* AIひと言 */}
          {summary.ai_comment && (
            <div style={{ background:"#f6f3ff", border:"1.5px solid #b8a0e0",
              borderRadius:"12px", overflow:"hidden", marginBottom:"16px", animation:"fadeIn 0.4s ease" }}>
              <div style={{ background:"#7c5cbf", padding:"8px 16px",
                display:"flex", alignItems:"center", gap:"8px" }}>
                <div style={{ width:"20px", height:"20px", borderRadius:"50%",
                  background:"rgba(255,255,255,0.3)", display:"flex",
                  alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <span style={{ color:"#fff", fontSize:"9px", fontWeight:"700" }}>AI</span>
                </div>
                <span style={{ color:"#fff", fontSize:"12px", fontWeight:"700", letterSpacing:"0.08em" }}>
                  今日の会話を通じて感じたこと
                </span>
              </div>
              <div style={{ padding:"16px" }}>
                <p style={{ color:"#3a2060", fontSize:"14px", lineHeight:"1.9", margin:0 }}>
                  {summary.ai_comment}
                </p>
              </div>
            </div>
          )}

          {/* ── Growth Feedback ── */}
          {summary.feedback && (() => {
            const axes = [
              { key:"insight",    label:"顧客洞察力", emoji:"🔍" },
              { key:"hypothesis", label:"仮説構築力", emoji:"💡" },
              { key:"strategy",   label:"戦略的思考", emoji:"📊" },
              { key:"execution",  label:"実行具体性", emoji:"🎯" },
            ];
            const prev = summary.prevFeedback;
            const renderStars = (score) => {
              let s = "";
              for (let i = 0; i < 5; i++) s += i < score ? "★" : "☆";
              return s;
            };
            const renderDelta = (cur, prevScore) => {
              if (prevScore === undefined || prevScore === null) return null;
              const diff = cur - prevScore;
              if (diff > 0) return { text:`↑+${diff}`, color:"#16a34a" };
              if (diff < 0) return { text:`↓${diff}`, color:"#dc2626" };
              return { text:"→", color:"#9a8a75" };
            };
            return (
              <div style={{ background:"linear-gradient(135deg, #f0f4ff, #faf8ff)",
                border:"1.5px solid #8090d0", borderRadius:"12px", overflow:"hidden",
                marginBottom:"16px", animation:"fadeIn 0.5s ease" }}>
                <div style={{ background:"linear-gradient(135deg, #3a4f9a, #5a6fcf)",
                  padding:"10px 16px", display:"flex", alignItems:"center", gap:"8px" }}>
                  <span style={{ fontSize:"16px" }}>📈</span>
                  <span style={{ color:"#fff", fontSize:"13px", fontWeight:"700", letterSpacing:"0.1em" }}>
                    Growth Feedback
                  </span>
                  {prev && (
                    <span style={{ marginLeft:"auto", color:"rgba(255,255,255,0.7)", fontSize:"10px" }}>
                      前回比較あり
                    </span>
                  )}
                </div>
                <div style={{ padding:"16px" }}>
                  {axes.map(ax => {
                    const fb = summary.feedback[ax.key];
                    if (!fb) return null;
                    const delta = prev ? renderDelta(fb.score, prev[ax.key]) : null;
                    return (
                      <div key={ax.key} style={{ marginBottom:"14px", paddingBottom:"14px",
                        borderBottom:"1px solid #e0d8f0" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"4px" }}>
                          <span style={{ fontSize:"14px" }}>{ax.emoji}</span>
                          <span style={{ color:"#2a3570", fontSize:"13px", fontWeight:"700", flex:1 }}>
                            {ax.label}
                          </span>
                          <span style={{ color:"#b8943f", fontSize:"14px", letterSpacing:"2px" }}>
                            {renderStars(fb.score)}
                          </span>
                          <span style={{ color:"#2a3570", fontSize:"12px", fontWeight:"700", minWidth:"28px", textAlign:"right" }}>
                            {fb.score}/5
                          </span>
                          {delta && (
                            <span style={{ color:delta.color, fontSize:"11px", fontWeight:"700", minWidth:"32px" }}>
                              {delta.text}
                            </span>
                          )}
                        </div>
                        {fb.comment && (
                          <p style={{ color:"#4a4570", fontSize:"12px", lineHeight:"1.7",
                            margin:"4px 0 0 22px" }}>{fb.comment}</p>
                        )}
                      </div>
                    );
                  })}
                  {summary.feedback.overall && (
                    <div style={{ background:"rgba(58,79,154,0.06)", borderRadius:"8px",
                      padding:"12px", marginTop:"4px" }}>
                      <p style={{ color:"#2a3570", fontSize:"12px", fontWeight:"700", margin:"0 0 4px" }}>
                        総合コメント
                      </p>
                      <p style={{ color:"#3a3060", fontSize:"13px", lineHeight:"1.85", margin:0 }}>
                        {summary.feedback.overall}
                      </p>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          <GoldDivider />
          <div style={{ display:"flex", gap:"10px", paddingBottom:"40px" }}>
            <GhostBtn onClick={() => setPhase("chat")}>← 戻る</GhostBtn>
            <GoldBtn onClick={reset} style={{ flex:1 }}>新しいセッション</GoldBtn>
          </div>
        </div>
      </Page>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
